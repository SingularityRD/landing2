<!DOCTYPE html>
<html>
<head>
    <title>Footer Image Test</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: white;
        }
        .test {
            width: 100%;
            height: 500px;
            background: url('footer.png') center/cover no-repeat;
            border: 3px solid yellow;
            margin: 20px 0;
        }
        .test2 {
            width: 300px;
            height: 300px;
            background: url('footer.png') contain no-repeat;
            border: 2px solid red;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Footer Image Test</h1>
    <div class="test">Full cover test - should see footer image here</div>
    <div class="test2">Contain test - should see footer image here</div>
    <img src="footer.png" alt="Direct image test" style="max-width: 100%; border: 2px solid green;">
</body>
</html>
